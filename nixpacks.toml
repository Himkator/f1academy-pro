[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "postgresql"]

[phases.install]
cmds = [
    "composer install --no-interaction --optimize-autoloader --no-dev --ignore-platform-reqs"
]

[phases.build]
cmds = [
    "php artisan key:generate --force",
    "php artisan config:clear",
    "php artisan view:clear"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"