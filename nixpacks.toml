[variables]
PHP_VERSION = "8.4"
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Packages.extensions.pdo_pgsql", "php84Packages.extensions.pgsql", "php84Packages.extensions.mbstring", "php84Packages.extensions.gd", "postgresql"]

[phases.install]
cmds = [
    "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --no-scripts --no-autoloader --prefer-dist",
    "COMPOSER_ALLOW_SUPERUSER=1 composer dump-autoload --optimize"
]

[phases.build]
cmds = [
    "cp .env.example .env",
    "php artisan key:generate --force",
    "php artisan config:clear",
    "php artisan view:clear"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"